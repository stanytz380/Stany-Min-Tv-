    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0a12;
            --card: #16162a;
            --primary: #f97316;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --success: #10b981;
            --text: #ffffff;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 20px rgba(249,115,22,0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,10,18,0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid var(--primary);
            box-shadow: var(--shadow-glow);
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .btn {
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 12px rgba(249,115,22,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(249,115,22,0.5);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: rgba(249,115,22,0.1);
            transform: translateY(-2px);
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 24px;
            margin: 40px 0;
        }

        .category-card {
            background: var(--card);
            border-radius: 28px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            text-align: center;
        }

        .category-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .category-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }

        .category-name {
            padding: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            background: var(--card);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin: 30px 0;
        }

        .service-card {
            background: var(--card);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .service-card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
            box-shadow: var(--shadow);
        }

        .service-img {
            width: 100%;
            height: 170px;
            object-fit: cover;
        }

        .service-content {
            padding: 18px;
        }

        .price-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            border-radius: 32px;
            max-width: 580px;
            width: 100%;
            max-height: 88vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .price-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 14px 20px;
            margin: 10px 0;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .price-option.selected {
            background: rgba(249,115,22,0.25);
            border-color: var(--primary);
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 60px;
            color: white;
            margin-bottom: 14px;
            font-size: 0.95rem;
        }

        .form-textarea {
            border-radius: 24px;
            resize: vertical;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .requirements-box {
            background: rgba(6,182,212,0.08);
            padding: 18px;
            border-radius: 24px;
            margin: 15px 0;
            font-size: 0.85rem;
            border-left: 4px solid var(--accent);
        }

        .requirements-box ul {
            margin-left: 20px;
            margin-top: 10px;
            list-style: none;
        }

        .requirements-box li {
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .requirements-box li i {
            color: var(--accent);
            width: 20px;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 5px 20px rgba(37,211,102,0.5);
            z-index: 99;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .whatsapp-float:hover {
            transform: scale(1.08);
        }

        .section-title {
            font-size: 1.6rem;
            margin: 20px 0 10px;
            border-left: 4px solid var(--primary);
            padding-left: 16px;
        }

        @media (max-width: 680px) {
            .categories-grid { gap: 12px; }
            .category-img { height: 110px; }
            .section-title { font-size: 1.3rem; }
        }
    </style>
</head>

    async function loadServicesFromFirestore() {
        const snap = await db.collection("services").get();
        if(!snap.empty) {
            SERVICES = [];
            snap.forEach(doc => SERVICES.push({ id: doc.id, ...doc.data() }));
        } else {
            for(const s of SERVICES) await db.collection("services").add(s);
        }
        renderCategories();
    }

    function renderCategories() {
        const container = document.getElementById('categoriesContainer');
        container.innerHTML = `<div class="categories-grid" id="categoriesGrid"></div>`;
        const grid = document.getElementById('categoriesGrid');
        grid.innerHTML = CATEGORIES.map(cat => `
            <div class="category-card" data-cat="${cat.key}">
                <img src="${cat.img}" class="category-img" alt="${cat.name}">
                <div class="category-name">${cat.name}</div>
            </div>
        `).join('');
        document.querySelectorAll('.category-card').forEach(card => {
            card.addEventListener('click', () => {
                const catKey = card.dataset.cat;
                let filtered = catKey === 'all' ? SERVICES : SERVICES.filter(s => s.category === catKey);
                displayServices(filtered);
                document.getElementById('servicesArea').style.display = 'block';
                document.getElementById('servicesTitle').innerHTML = `<i class="fas fa-box-open"></i> ${catKey === 'all' ? 'All Services' : catKey.toUpperCase()}`;
                window.scrollTo({ top: 350, behavior: 'smooth' });
            });
        });
    }

    function displayServices(services) {
        const grid = document.getElementById('servicesGrid');
        grid.innerHTML = services.map(svc => `
            <div class="service-card" data-svc='${JSON.stringify(svc).replace(/'/g, "&apos;")}'>
                <img src="${svc.img}" class="service-img" onerror="this.src='https://placehold.co/400x250/16162a/f97316?text=Service'">
                <div class="service-content">
                    <h3>${svc.name}</h3>
                    <p style="color: var(--text-muted); font-size:0.85rem; margin: 8px 0;">${svc.desc || ''}</p>
                    <div class="price-badge">${svc.prices[0].price}</div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.service-card').forEach(card => {
            card.addEventListener('click', () => {
                const raw = card.dataset.svc;
                const service = JSON.parse(raw.replace(/&apos;/g, "'"));
                openOrderModal(service);
            });
        });
    }

    function sendWhatsAppOrder(name, phone, service, plan, extraData) {
        let phoneNum = phone.replace(/\D/g,'');
        if(!phoneNum.startsWith('255')) phoneNum = '255' + phoneNum.replace(/^0/,'');
        
        let message = `*🛒 STANY PANEL SERVICE - NEW ORDER*%0A%0A`;
        message += `📦 *Service:* ${service.name}%0A`;
        message += `💰 *Plan:* ${plan.plan} - ${plan.price}%0A`;
        message += `👤 *Customer Name:* ${name}%0A`;
        message += `📞 *WhatsApp:* ${phone}%0A`;
        
        if(extraData.panelEmail && extraData.panelPass) {
            message += `📧 *Email:* ${extraData.panelEmail}%0A`;
            message += `🔑 *Panel Password:* ${extraData.panelPass}%0A`;
        }
        
        if(extraData.documents) {
            message += `%0A📋 *Available Documents:*%0A${extraData.documents}%0A`;
            message += `📍 *Service Area:* Tanzania Nzima%0A`;
        }
        
        if(extraData.nidaNumber) {
            message += `%0A🆔 *NIDA Number:* ${extraData.nidaNumber}%0A`;
            message += `👩 *Mother's Name/School Year:* ${extraData.motherInfo}%0A`;
            message += `🏙️ *Region:* ${extraData.region || 'Not specified'}%0A`;
        }
        
        message += `%0A✅ *Payment Status:* Pending Confirmation%0A`;
        message += `📝 *Note:* I confirm my order details above. Please verify and share payment instructions.%0A%0A`;
        message += `📅 *Order Date:* ${new Date().toLocaleString()}`;
        
        // Save to Firestore
        db.collection("orders").add({
            customerName: name, customerPhone: phone, serviceName: service.name,
            planName: plan.plan, amount: plan.price, status: "pending",
            createdAt: firebase.firestore.FieldValue.serverTimestamp(), userId: currentUser?.uid || "guest"
        }).catch(console.error);
        
        // Open WhatsApp
        window.open(`https://wa.me/255787069580?text=${message}`, '_blank');
    }

    function openOrderModal(service) {
        selectedService = service;
        selectedPlan = service.prices[0];
        
        let priceHtml = service.prices.map((p, idx) => `
            <div class="price-option ${idx===0?'selected':''}" data-plan='${JSON.stringify(p)}'>

                <strong><i class="fas fa-coins"></i> ${p.price}</strong>

        let requirementsHtml = '';
        if(service.id === 'birthcert') {

                        <li><i class="fas fa-building"></i> Barua kutoka kwa Afisa Mtendaji</li>
                    </ul>
                    <p><strong><i class="fas fa-info-circle"></i> Unatakiwa kuwa na angalau viambatanisho viwili (2) au zaidi.</strong></p>
                </div>
            `;
        } else if(service.id === 'nida') {
            requirementsHtml = `

                    <strong><i class="fas fa-id-card"></i> MAHITAJI YA NIDA SOFT COPY:</strong>
                    <ul>
                        <li><i class="fas fa-qrcode"></i> Namba ya NIDA</li>
                        <li><i class="fas fa-female"></i> Jina la mama au Mwaka wa kumaliza shule</li>
                        <li><i class="fas fa-map-marker-alt"></i> Mkoa unaoishi</li>
                    </ul>
                </div>
            `;
        }
        
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal active';
        modalDiv.innerHTML = `
            <div class="modal-content" style="padding: 0;">
                <div style="padding: 24px; border-bottom:1px solid var(--border); background: linear-gradient(135deg, rgba(249,115,22,0.1), transparent);">
                    <h3><i class="fas fa-cube"></i> ${service.name}</h3>
                    <p style="color: var(--text-muted); margin-top: 6px;">${service.desc || ''}</p>
                </div>
                <div style="padding: 20px 24px;">
                    <div style="margin-bottom: 10px;"><i class="fas fa-tags"></i> Select Plan:</div>
                    <div id="modalPriceList">${priceHtml}</div>
                </div>
                ${requirementsHtml}
                <div style="padding: 0 24px 20px;">
                    <div style="margin: 10px 0 5px;"><i class="fas fa-user"></i> Your Information:</div>
                    <input type="text" id="orderName" class="form-input" placeholder="Full Name" value="${currentUser?.displayName || ''}">
                    <input type="tel" id="orderPhone" class="form-input" placeholder="WhatsApp Number" value="${currentUser?.phoneNumber || ''}">
                    
                    <div id="panelFields" style="display: ${service.needPanel ? 'block' : 'none'};">
                        <div style="margin: 10px 0 5px;"><i class="fas fa-envelope"></i> Panel Login Details:</div>
                        <input type="email" id="orderEmail" class="form-input" placeholder="Email for Panel Login">
                        <input type="password" id="orderPass" class="form-input" placeholder="Create Panel Password">
                    </div>
                    
                    <div id="birthFields" style="display: ${service.id === 'birthcert' ? 'block' : 'none'};">
                        <div style="margin: 10px 0 5px;"><i class="fas fa-paperclip"></i> Available Documents (list at least 2):</div>
                        <textarea id="docList" class="form-textarea" rows="3" placeholder="Example:&#10;✓ Kadi ya Kliniki&#10;✓ Cheti cha FALAKI"></textarea>
                    </div>
                    
                    <div id="nidaFields" style="display: ${service.id === 'nida' ? 'block' : 'none'};">
                        <input type="text" id="nidaNumber" class="form-input" placeholder="NIDA Number">
                        <input type="text" id="motherInfo" class="form-input" placeholder="Jina la mama au Mwaka wa kumaliza">
                        <input type="text" id="region" class="form-input" placeholder="Mkoa unaoishi">
                    </div>
                    
                    <button id="sendWhatsAppBtn" class="btn btn-primary" style="width:100%; justify-content:center; margin-top: 16px;">
                        <i class="fab fa-whatsapp"></i> Order via WhatsApp
                    </button>
                </div>
                <button class="closeModalBtn" style="position:absolute; top:16px; right:20px; background:none; border:none; font-size:28px; color:white; cursor:pointer;">&times;</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        
        document.querySelectorAll('.price-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.price-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedPlan = JSON.parse(opt.dataset.plan);
            });
        });
        
        document.querySelector('.closeModalBtn').addEventListener('click', () => modalDiv.remove());
        modalDiv.addEventListener('click', (e) => { if(e.target === modalDiv) modalDiv.remove(); });
        
        document.getElementById('sendWhatsAppBtn').addEventListener('click', () => {
            let name = document.getElementById('orderName').value.trim();
            let phone = document.getElementById('orderPhone').value.trim();
            
            if(!name) { alert("❌ Please enter your full name"); return; }
            if(!phone) { alert("❌ Please enter your WhatsApp number"); return; }
            
            let extraData = {};
            
            if(selectedService.needPanel) {
                let email = document.getElementById('orderEmail')?.value.trim();
                let pass = document.getElementById('orderPass')?.value.trim();
                if(!email || !pass) { alert("❌ Email and Password required for panel service"); return; }
                extraData.panelEmail = email;
                extraData.panelPass = pass;
            }
            
            if(selectedService.id === 'birthcert') {
                let docs = document.getElementById('docList')?.value.trim();
                if(!docs || docs.length < 5) { alert("❌ Please list at least 2 available documents for Birth Certificate"); return; }
                extraData.documents = docs;
            }
            
            if(selectedService.id === 'nida') {
                let nida = document.getElementById('nidaNumber')?.value.trim();
                let mother = document.getElementById('motherInfo')?.value.trim();
                if(!nida || !mother) { alert("❌ Please fill NIDA Number and Mother's Name/School Year"); return; }
                extraData.nidaNumber = nida;
                extraData.motherInfo = mother;
                extraData.region = document.getElementById('region')?.value.trim() || '';
            }
            
            sendWhatsAppOrder(name, phone, selectedService, selectedPlan, extraData);
            modalDiv.remove();
            alert("✅ Order sent successfully! Admin will respond on WhatsApp shortly.");
        });
    }

    let isLogin = false;
    document.getElementById('loginBtn')?.addEventListener('click', () => {
        isLogin = true;
        document.getElementById('authTitle').innerText = "Login";
        document.getElementById('authBtn').innerText = "Login";
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('authPage').style.display = 'block';
        document.getElementById('dashboardPage').style.display = 'none';
    });
    document.getElementById('signupBtn')?.addEventListener('click', () => {
        isLogin = false;
        document.getElementById('authTitle').innerText = "Create Account";
        document.getElementById('authBtn').innerText = "Sign Up";
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('authPage').style.display = 'block';
        document.getElementById('dashboardPage').style.display = 'none';
    });
    document.getElementById('toggleAuthMode')?.addEventListener('click', () => {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? "Login" : "Create Account";
        document.getElementById('authBtn').innerText = isLogin ? "Login" : "Sign Up";
    });
    document.getElementById('authForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const pwd = document.getElementById('password').value;
        if(!username || !phone || pwd.length<6) { alert("Fill all fields correctly"); return; }
        try {
            if(isLogin) {
                await auth.signInWithEmailAndPassword(username.replace(/\s/g,'')+"@stany.com", pwd);
            } else {
                await auth.createUserWithEmailAndPassword(username.replace(/\s/g,'')+"@stany.com", pwd);
                await auth.currentUser.updateProfile({displayName: username});
                await db.collection("users").doc(auth.currentUser.uid).set({name: username, phone, createdAt: new Date()});
            }
        } catch(err) { alert(err.message); }
    });
    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUser = user;
            document.getElementById('authButtons').style.display = 'none';
            document.getElementById('userMenu').style.display = 'flex';
            document.getElementById('userName').innerText = user.displayName || "User";
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('dashboardPage').style.display = 'block';
            await loadServicesFromFirestore();
            document.getElementById('servicesArea').style.display = 'none';
        } else {
            currentUser = null;
            document.getElementById('authButtons').style.display = 'flex';
            document.getElementById('userMenu').style.display = 'none';
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('dashboardPage').style.display = 'none';
            document.getElementById('authPage').style.display = 'none';
        }
    });
    document.getElementById('logoutBtn')?.addEventListener('click', () => auth.signOut());
    document.getElementById('homeLink')?.addEventListener('click', () => {
        if(currentUser) {
            document.getElementById('dashboardPage').style.display = 'block';
            document.getElementById('servicesArea').style.display = 'none';
            document.getElementById('homePage').style.display = 'none';
        } else {
            document.getElementById('homePage').style.display = 'block';
        }
    });
    document.getElementById('exploreBtn')?.addEventListener('click', () => {
        if(!currentUser) {
            isLogin = false;
            document.getElementById('authTitle').innerText = "Create Account";
            document.getElementById('authBtn').innerText = "Sign Up";
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('authPage').style.display = 'block';
        }
    });
    document.getElementById('backBtn')?.addEventListener('click', () => {
        document.getElementById('servicesArea').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    document.getElementById('whatsappFloatBtn')?.addEventListener('click', (e) => {
        e.preventDefault();
        window.open('https://wa.me/255787069580?text=Hello%20Stany%20Panel!%20I%20need%20assistance.', '_blank');
    });
</script>
</body>
</html>
