<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STANY MIN TV - ADMIN PANEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
        body{background:#0a0a0a;color:#ffffff;}
        
        :root{
            --primary:#00e676;
            --primary-dark:#00c853;
            --danger:#ff3b30;
            --warning:#ff9500;
            --success:#34c759;
            --premium:#ffd700;
            --card:#141414;
            --border:#2a2a2a;
            --text:#ffffff;
            --text-secondary:#888888;
        }
        
        .login-container{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:#0a0a0a;display:flex;justify-content:center;
            align-items:center;z-index:1000;
        }
        .login-box{
            background:var(--card);padding:40px;border-radius:24px;
            width:90%;max-width:400px;border:1px solid var(--border);
        }
        .login-box h2{text-align:center;margin-bottom:30px;color:var(--primary);}
        .input{
            width:100%;padding:14px 16px;background:#1a1a1a;
            border:1px solid var(--border);border-radius:12px;
            color:#fff;font-size:14px;margin-bottom:16px;outline:none;
        }
        .input:focus{border-color:var(--primary);}
        .btn{
            width:100%;padding:14px;border:none;border-radius:12px;
            font-weight:600;font-size:14px;cursor:pointer;
        }
        .btn-primary{background:var(--primary);color:#000;}
        .btn-danger{background:var(--danger);color:#fff;}
        .btn-warning{background:var(--warning);color:#000;}
        .btn-success{background:var(--success);color:#000;}
        
        .app-container{display:none;}
        
        .sidebar{
            position:fixed;left:0;top:0;width:260px;height:100%;
            background:var(--card);border-right:1px solid var(--border);
            overflow-y:auto;z-index:100;
        }
        .sidebar-header{padding:24px 20px;border-bottom:1px solid var(--border);}
        .sidebar-header h2{color:var(--primary);font-size:18px;}
        .sidebar-menu{padding:16px 0;}
        .menu-item{
            display:flex;align-items:center;gap:12px;padding:12px 20px;
            color:var(--text-secondary);cursor:pointer;transition:0.2s;
        }
        .menu-item:hover,.menu-item.active{
            background:rgba(0,230,118,0.1);color:var(--primary);
        }
        .menu-item i{width:24px;}
        
        .main-content{
            margin-left:260px;padding:20px;min-height:100vh;
        }
        .header{
            display:flex;justify-content:space-between;align-items:center;
            margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);
        }
        .header h1{font-size:24px;}
        .logout-btn{
            background:var(--danger);padding:8px 16px;border-radius:10px;
            border:none;color:#fff;cursor:pointer;
        }
        
        .stats-grid{
            display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:16px;margin-bottom:24px;
        }
        .stat-card{
            background:var(--card);padding:20px;border-radius:16px;
            border:1px solid var(--border);
        }
        .stat-number{font-size:32px;font-weight:700;color:var(--primary);}
        .stat-label{color:var(--text-secondary);font-size:14px;margin-top:8px;}
        
        .section{
            background:var(--card);border-radius:16px;padding:20px;
            margin-bottom:24px;border:1px solid var(--border);
        }
        .section-header{
            display:flex;justify-content:space-between;align-items:center;
            margin-bottom:20px;
        }
        .section-header h3{font-size:18px;}
        
        table{width:100%;border-collapse:collapse;}
        th,td{padding:12px;text-align:left;border-bottom:1px solid var(--border);}
        th{color:var(--text-secondary);font-weight:500;}
        
        .user-status{
            padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;
            display:inline-block;
        }
        .status-premium{background:var(--premium);color:#000;}
        .status-trial{background:var(--warning);color:#000;}
        .status-blocked{background:var(--danger);color:#fff;}
        .status-expired{background:var(--text-secondary);color:#000;}
        
        .modal{
            display:none;position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);
            justify-content:center;align-items:center;z-index:2000;
        }
        .modal.show{display:flex;}
        .modal-content{
            background:var(--card);padding:24px;border-radius:20px;
            width:90%;max-width:500px;max-height:80vh;overflow-y:auto;
        }
        .modal-content h3{margin-bottom:20px;}
        .form-group{margin-bottom:16px;}
        .form-group label{display:block;margin-bottom:6px;font-size:13px;color:var(--text-secondary);}
        
        .grid-cards{
            display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
            gap:12px;
        }
        .content-card{
            background:#1a1a1a;border-radius:12px;overflow:hidden;
            border:1px solid var(--border);
        }
        .content-card img{width:100%;height:120px;object-fit:cover;}
        .content-card .info{padding:10px;}
        .content-card .title{font-size:13px;font-weight:600;margin-bottom:6px;}
        .card-actions{display:flex;gap:6px;margin-top:8px;}
        .card-actions button{flex:1;padding:6px;border-radius:8px;border:none;font-size:11px;cursor:pointer;}
        
        .search-box{
            width:100%;padding:12px 16px;background:#1a1a1a;
            border:1px solid var(--border);border-radius:12px;
            color:#fff;margin-bottom:16px;
        }
        
        .filter-buttons{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
        .filter-btn{padding:8px 16px;background:#1a1a1a;border:none;border-radius:20px;color:#fff;cursor:pointer;}
        .filter-btn.active{background:var(--primary);color:#000;}
        
        .drm-fields{background:#1a1a1a;padding:16px;border-radius:12px;margin-top:12px;}
        
        @media (max-width:768px){
            .sidebar{transform:translateX(-100%);transition:0.3s;z-index:1000;}
            .sidebar.open{transform:translateX(0);}
            .main-content{margin-left:0;}
            .menu-toggle{display:block;position:fixed;bottom:20px;right:20px;z-index:1001;}
        }
    </style>
</head>
<body>

<div class="login-container" id="loginContainer">
    <div class="login-box">
        <h2><i class="fas fa-crown"></i> STANY MIN TV ADMIN</h2>
        <input type="email" id="adminEmail" class="input" placeholder="Admin Email" value="stanytv@gmail.com">
        <input type="password" id="adminPassword" class="input" placeholder="Password" value="stanytv123#">
        <button class="btn btn-primary" onclick="adminLogin()">Login</button>
    </div>
</div>

<div class="app-container" id="appContainer">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-tv"></i> STANY MIN TV</h2>
            <p style="font-size:12px;color:#888;margin-top:8px;">Admin Panel</p>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item active" onclick="loadPage('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
            <div class="menu-item" onclick="loadPage('users')"><i class="fas fa-users"></i> Users</div>
            <div class="menu-item" onclick="loadPage('channels')"><i class="fas fa-tv"></i> Channels</div>
            <div class="menu-item" onclick="loadPage('movies')"><i class="fas fa-film"></i> Movies</div>
            <div class="menu-item" onclick="loadPage('schedule')"><i class="fas fa-calendar"></i> Match Schedule</div>
            <div class="menu-item" onclick="loadPage('carousel')"><i class="fas fa-images"></i> Carousel</div>
            <div class="menu-item" onclick="loadPage('settings')"><i class="fas fa-cog"></i> Settings</div>
        </div>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h1 id="pageTitle">Dashboard</h1>
            <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
        <div id="pageContent"></div>
    </div>
</div>

<div class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
    <i class="fas fa-bars" style="background:var(--primary);padding:12px;border-radius:50%;color:#000;"></i>
</div>

<div class="modal" id="channelModal">
    <div class="modal-content">
        <h3 id="channelModalTitle">Add Channel</h3>
        <input type="hidden" id="channelId">
        <div class="form-group">
            <label>Channel Name</label>
            <input type="text" id="channelName" class="input" placeholder="Channel Name">
        </div>
        <div class="form-group">
            <label>Channel Type</label>
            <select id="channelType" class="input" onchange="toggleChannelType()">
                <option value="normal">Normal (HLS/MP4)</option>
                <option value="drm">DRM (Token + License)</option>
            </select>
        </div>
        <div id="normalFields">
            <div class="form-group">
                <label>Stream URL</label>
                <input type="text" id="channelUrl" class="input" placeholder="https://example.com/stream.m3u8">
            </div>
        </div>
        <div id="drmFields" style="display:none;">
            <div class="drm-fields">
                <div class="form-group">
                    <label>Token / API Key</label>
                    <input type="text" id="drmToken" class="input" placeholder="Bearer token or API key">
                </div>
                <div class="form-group">
                    <label>License URL</label>
                    <input type="text" id="licenseUrl" class="input" placeholder="https://example.com/license">
                </div>
                <div class="form-group">
                    <label>MPD Stream URL</label>
                    <input type="text" id="mpdUrl" class="input" placeholder="https://example.com/manifest.mpd">
                </div>
            </div>
        </div>
        <div class="form-group">
            <label>Poster URL</label>
            <input type="text" id="channelPoster" class="input" placeholder="Image URL">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="channelDesc" class="input" rows="3" placeholder="Channel description"></textarea>
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="channelCategory" class="input">
                <option value="general">General</option>
                <option value="sports">Sports</option>
                <option value="news">News</option>
                <option value="entertainment">Entertainment</option>
                <option value="premium">Premium</option>
            </select>
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="channelPremium"> Premium Only (Locked for trial users)</label>
        </div>
        <div class="form-group">
            <button class="btn btn-primary" onclick="saveChannel()">Save Channel</button>
            <button class="btn" style="background:#333;margin-top:8px;" onclick="closeModal('channelModal')">Cancel</button>
        </div>
    </div>
</div>

<div class="modal" id="movieModal">
    <div class="modal-content">
        <h3 id="movieModalTitle">Add Movie</h3>
        <input type="hidden" id="movieId">
        <div class="form-group">
            <label>Movie Title</label>
            <input type="text" id="movieTitle" class="input" placeholder="Movie Title">
        </div>
        <div class="form-group">
            <label>External ID (for vidsrc.to)</label>
            <input type="text" id="movieExternalId" class="input" placeholder="TMDB ID or IMDB ID (e.g., 1523145)">
        </div>
        <div class="form-group">
            <label>Poster URL</label>
            <input type="text" id="moviePoster" class="input" placeholder="Image URL">
        </div>
        <div class="form-group">
            <label>Backdrop URL</label>
            <input type="text" id="movieBackdrop" class="input" placeholder="Backdrop image URL">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="movieDesc" class="input" rows="3" placeholder="Movie description"></textarea>
        </div>
        <div class="form-group">
            <label>Rating</label>
            <input type="number" id="movieRating" class="input" step="0.1" placeholder="0-10">
        </div>
        <div class="form-group">
            <label>Year</label>
            <input type="number" id="movieYear" class="input" placeholder="2024">
        </div>
        <div class="form-group">
            <label>Genre</label>
            <select id="movieGenre" class="input">
                <option value="action">Action</option>
                <option value="comedy">Comedy</option>
                <option value="drama">Drama</option>
                <option value="horror">Horror</option>
                <option value="romance">Romance</option>
                <option value="sci-fi">Sci-Fi</option>
                <option value="sports">Sports</option>
            </select>
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="moviePremium"> Premium Only</label>
        </div>
        <div class="form-group">
            <button class="btn btn-primary" onclick="saveMovie()">Save Movie</button>
            <button class="btn" style="background:#333;margin-top:8px;" onclick="closeModal('movieModal')">Cancel</button>
        </div>
    </div>
</div>

<div class="modal" id="scheduleModal">
    <div class="modal-content">
        <h3 id="scheduleModalTitle">Add Schedule Item</h3>
        <input type="hidden" id="scheduleId">
        <input type="hidden" id="scheduleType">
        <div class="form-group">
            <label>Event Type</label>
            <select id="scheduleEventType" class="input" onchange="toggleScheduleFields()">
                <option value="match">Football Match</option>
                <option value="series">Series/Movie</option>
            </select>
        </div>
        <div id="matchFields">
            <div class="form-group">
                <label>Team 1 Name</label>
                <input type="text" id="team1" class="input" placeholder="Team 1">
            </div>
            <div class="form-group">
                <label>Team 1 Logo URL</label>
                <input type="text" id="team1Logo" class="input" placeholder="Logo URL">
            </div>
            <div class="form-group">
                <label>Team 2 Name</label>
                <input type="text" id="team2" class="input" placeholder="Team 2">
            </div>
            <div class="form-group">
                <label>Team 2 Logo URL</label>
                <input type="text" id="team2Logo" class="input" placeholder="Logo URL">
            </div>
        </div>
        <div id="seriesFields" style="display:none;">
            <div class="form-group">
                <label>Series/Movie Title</label>
                <input type="text" id="seriesTitle" class="input" placeholder="Title">
            </div>
            <div class="form-group">
                <label>Logo URL</label>
                <input type="text" id="seriesLogo" class="input" placeholder="Logo URL">
            </div>
            <div class="form-group">
                <label>Movie ID (optional)</label>
                <input type="text" id="seriesMovieId" class="input" placeholder="Associated movie ID">
            </div>
        </div>
        <div class="form-group">
            <label>Match Time</label>
            <input type="datetime-local" id="scheduleTime" class="input">
        </div>
        <div class="form-group">
            <label>Channel Name</label>
            <input type="text" id="scheduleChannel" class="input" placeholder="Channel name">
        </div>
        <div class="form-group">
            <label>Channel ID (for streaming)</label>
            <input type="text" id="scheduleChannelId" class="input" placeholder="Associated channel ID">
        </div>
        <div class="form-group">
            <button class="btn btn-primary" onclick="saveScheduleItem()">Save</button>
            <button class="btn" style="background:#333;margin-top:8px;" onclick="closeModal('scheduleModal')">Cancel</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAGQqAiYCnWR7X8XkxEXCGu19PU45qXDnc",
        authDomain: "stanyappstore.firebaseapp.com",
        projectId: "stanyappstore",
        storageBucket: "stanyappstore.firebasestorage.app",
        messagingSenderId: "735017831251",
        appId: "1:735017831251:web:9fa4184ef141349fb9afa6"
    };
    
    if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let allUsers = [];
    let allChannels = [];
    let allMovies = [];
    let allMatches = [];
    let allSeries = [];
    let carouselItems = [];
    
    function adminLogin(){
        let email = document.getElementById('adminEmail').value;
        let pass = document.getElementById('adminPassword').value;
        auth.signInWithEmailAndPassword(email,pass)
            .then(() => {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                loadPage('dashboard');
            })
            .catch(e => alert(e.message));
    }
    
    function adminLogout(){
        auth.signOut().then(() => {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
        });
    }
    
    auth.onAuthStateChanged(user => {
        if(user){
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            loadPage('dashboard');
        }
    });
    
    function loadData(){
        db.ref('users').on('value', snap => {
            allUsers = [];
            snap.forEach(u => { allUsers.push({ id: u.key, ...u.val() }); });
            if(document.getElementById('pageContent').innerHTML.includes('Users')) loadUsersPage();
        });
        db.ref('channels').on('value', snap => {
            allChannels = [];
            snap.forEach(c => { allChannels.push({ id: c.key, ...c.val() }); });
        });
        db.ref('movies').on('value', snap => {
            allMovies = [];
            snap.forEach(m => { allMovies.push({ id: m.key, ...m.val() }); });
        });
        db.ref('matchSchedule').on('value', snap => {
            allMatches = [];
            snap.forEach(m => { allMatches.push({ id: m.key, ...m.val() }); });
        });
        db.ref('seriesSchedule').on('value', snap => {
            allSeries = [];
            snap.forEach(s => { allSeries.push({ id: s.key, ...s.val() }); });
        });
        db.ref('carousel').on('value', snap => {
            carouselItems = [];
            snap.forEach(c => { carouselItems.push({ id: c.key, ...c.val() }); });
        });
    }
    
    function loadPage(page){
        document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        event.target.closest('.menu-item').classList.add('active');
        document.getElementById('pageTitle').innerText = page.charAt(0).toUpperCase() + page.slice(1);
        
        if(page === 'dashboard') loadDashboard();
        else if(page === 'users') loadUsersPage();
        else if(page === 'channels') loadChannelsPage();
        else if(page === 'movies') loadMoviesPage();
        else if(page === 'schedule') loadSchedulePage();
        else if(page === 'carousel') loadCarouselPage();
        else if(page === 'settings') loadSettingsPage();
        
        loadData();
    }
    
    function loadDashboard(){
        let html = `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div class="stat-label">Total Users</div></div>
                <div class="stat-card"><div class="stat-number" id="premiumUsers">0</div><div class="stat-label">Premium Users</div></div>
                <div class="stat-card"><div class="stat-number" id="trialUsers">0</div><div class="stat-label">Trial Users</div></div>
                <div class="stat-card"><div class="stat-number" id="blockedUsers">0</div><div class="stat-label">Blocked Users</div></div>
                <div class="stat-card"><div class="stat-number" id="totalChannels">${allChannels.length}</div><div class="stat-label">Channels</div></div>
                <div class="stat-card"><div class="stat-number" id="totalMovies">${allMovies.length}</div><div class="stat-label">Movies</div></div>
            </div>
            <div class="section">
                <div class="section-header"><h3>Recent Users</h3><button class="btn btn-primary" style="width:auto;padding:8px 16px;" onclick="loadPage('users')">View All</button></div>
                <div id="recentUsersList"></div>
            </div>
        `;
        document.getElementById('pageContent').innerHTML = html;
        
        let premium=0, trial=0, blocked=0;
        allUsers.forEach(u => {
            if(u.isPremium) premium++;
            if(u.trialExpiry && u.trialExpiry > Date.now()) trial++;
            if(u.isBlocked) blocked++;
        });
        document.getElementById('totalUsers').innerText = allUsers.length;
        document.getElementById('premiumUsers').innerText = premium;
        document.getElementById('trialUsers').innerText = trial;
        document.getElementById('blockedUsers').innerText = blocked;
        document.getElementById('totalChannels').innerText = allChannels.length;
        document.getElementById('totalMovies').innerText = allMovies.length;
        
        let recentHtml = '<table><tr><th>Name</th><th>Email</th><th>Status</th><th>Action</th></tr>';
        allUsers.slice(0,10).forEach(u => {
            let status = u.isPremium ? 'premium' : (u.trialExpiry && u.trialExpiry > Date.now() ? 'trial' : (u.isBlocked ? 'blocked' : 'expired'));
            recentHtml += `<tr>
                <td>${u.name || 'N/A'}</td>
                <td>${u.email || 'N/A'}</td>
                <td><span class="user-status status-${status}">${status.toUpperCase()}</span></td>
                <td><button class="btn btn-primary" style="width:auto;padding:4px 12px;" onclick="toggleUserBlock('${u.id}',${u.isBlocked})">${u.isBlocked ? 'Unblock' : 'Block'}</button></td>
            </tr>`;
        });
        recentHtml += '</table>';
        document.getElementById('recentUsersList').innerHTML = recentHtml;
    }
    
    function loadUsersPage(){
        let html = `
            <div class="section">
                <div class="section-header"><h3>All Users</h3></div>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterUsers('all')">All</button>
                    <button class="filter-btn" onclick="filterUsers('premium')">Premium</button>
                    <button class="filter-btn" onclick="filterUsers('trial')">Trial</button>
                    <button class="filter-btn" onclick="filterUsers('blocked')">Blocked</button>
                    <button class="filter-btn" onclick="filterUsers('expired')">Expired</button>
                </div>
                <input type="text" id="userSearch" class="search-box" placeholder="Search users..." onkeyup="filterUsers()">
                <div id="usersTable"></div>
            </div>
        `;
        document.getElementById('pageContent').innerHTML = html;
        filterUsers('all');
    }
    
    function filterUsers(filter){
        let filtered = [...allUsers];
        if(filter === 'premium') filtered = filtered.filter(u => u.isPremium === true);
        else if(filter === 'trial') filtered = filtered.filter(u => u.trialExpiry && u.trialExpiry > Date.now() && !u.isPremium);
        else if(filter === 'blocked') filtered = filtered.filter(u => u.isBlocked === true);
        else if(filter === 'expired') filtered = filtered.filter(u => u.trialExpiry && u.trialExpiry <= Date.now() && !u.isPremium && !u.isBlocked);
        
        let search = document.getElementById('userSearch')?.value.toLowerCase() || '';
        if(search) filtered = filtered.filter(u => (u.name || '').toLowerCase().includes(search) || (u.email || '').toLowerCase().includes(search));
        
        let html = '<table><tr><th>Name</th><th>Email</th><th>Device ID</th><th>Trial Expiry</th><th>Status</th><th>Actions</th></tr>';
        filtered.forEach(u => {
            let status = u.isPremium ? 'premium' : (u.trialExpiry && u.trialExpiry > Date.now() ? 'trial' : (u.isBlocked ? 'blocked' : 'expired'));
            let expiryDate = u.trialExpiry ? new Date(u.trialExpiry).toLocaleString() : 'N/A';
            html += `<tr>
                <td>${u.name || 'N/A'}</td>
                <td>${u.email || 'N/A'}</td>
                <td>${u.deviceId || 'N/A'}</td>
                <td>${expiryDate}</td>
                <td><span class="user-status status-${status}">${status.toUpperCase()}</span></td>
                <td>
                    <button class="btn btn-primary" style="width:auto;padding:4px 12px;" onclick="toggleUserBlock('${u.id}',${u.isBlocked})">${u.isBlocked ? 'Unblock' : 'Block'}</button>
                    <button class="btn btn-success" style="width:auto;padding:4px 12px;margin-left:8px;" onclick="makePremium('${u.id}')">Make Premium</button>
                    <button class="btn btn-warning" style="width:auto;padding:4px 12px;margin-left:8px;" onclick="extendTrial('${u.id}')">Extend Trial</button>
                </td>
            </tr>`;
        });
        html += '</table>';
        document.getElementById('usersTable').innerHTML = html;
    }
    
    function toggleUserBlock(uid, isBlocked){
        db.ref('users/' + uid + '/isBlocked').set(!isBlocked).then(() => showToast(`User ${!isBlocked ? 'blocked' : 'unblocked'}`));
    }
    
    function makePremium(uid){
        db.ref('users/' + uid).update({ isPremium: true, trialExpiry: null }).then(() => showToast('User upgraded to premium'));
    }
    
    function extendTrial(uid){
        let newExpiry = Date.now() + (2 * 60 * 1000);
        db.ref('users/' + uid).update({ trialExpiry: newExpiry, isPremium: false }).then(() => showToast('Trial extended by 2 minutes'));
    }

    function loadSchedulePage(){

            <div class="section">

    function renderScheduleLists(){

    function openScheduleModal(type){

        toggleScheduleFields();
        document.getElementById('scheduleTime').value = '';
        document.getElementById('scheduleChannel').value = '';
        document.getElementById('scheduleChannelId').value = '';
        if(type === 'match'){
            document.getElementById('team1').value = '';
            document.getElementById('team1Logo').value = '';
            document.getElementById('team2').value = '';
            document.getElementById('team2Logo').value = '';
        } else {
            document.getElementById('seriesTitle').value = '';
            document.getElementById('seriesLogo').value = '';
            document.getElementById('seriesMovieId').value = '';
        }
        document.getElementById('scheduleModal').classList.add('show');
    }
    
    function toggleScheduleFields(){
        let type = document.getElementById('scheduleEventType').value;
        document.getElementById('matchFields').style.display = type === 'match' ? 'block' : 'none';
        document.getElementById('seriesFields').style.display = type === 'series' ? 'block' : 'none';
    }
    
    function saveScheduleItem(){
        let type = document.getElementById('scheduleEventType').value;
        let time = document.getElementById('scheduleTime').value;
        let channel = document.getElementById('scheduleChannel').value;
        let channelId = document.getElementById('scheduleChannelId').value;
        
        if(type === 'match'){
            let data = {
                team1: document.getElementById('team1').value,
                team1Logo: document.getElementById('team1Logo').value,
                team2: document.getElementById('team2').value,
                team2Logo: document.getElementById('team2Logo').value,
                time: time ? new Date(time).getTime() : null,
                channel: channel,
                channelId: channelId,
                createdAt: Date.now()
            };
            db.ref('matchSchedule').push(data).then(() => { closeModal('scheduleModal'); renderScheduleLists(); showToast('Match added'); });
        } else {
            let data = {
                title: document.getElementById('seriesTitle').value,
                logo: document.getElementById('seriesLogo').value,
                movieId: document.getElementById('seriesMovieId').value,
                time: time ? new Date(time).getTime() : null,
                channel: channel,
                channelId: channelId,
                createdAt: Date.now()
            };
            db.ref('seriesSchedule').push(data).then(() => { closeModal('scheduleModal'); renderScheduleLists(); showToast('Series added'); });
        }
    }
    
    function deleteScheduleItem(type, id){
        if(confirm('Delete this item?')){
            let ref = type === 'match' ? 'matchSchedule' : 'seriesSchedule';
            db.ref(ref + '/' + id).remove().then(() => { renderScheduleLists(); showToast('Deleted'); });
        }

            <div class="modal" id="carouselModalInner">
                <div class="modal-content">
                    <h3>${title}</h3>
                    <input type="hidden" id="carouselId" value="${id || ''}">

                            <option value="channel">Channel</option>

        document.getElementById('carouselModalInner').classList.add('show');
    }

            description: document.getElementById('carouselDesc').value,

            itemId: document.getElementById('carouselItemId').value,

        if(id){
            db.ref('carousel/' + id).update(data).then(() => { closeModal('carouselModalInner'); renderCarouselList(); showToast('Updated'); });

    function editCarousel(id){ openCarouselModal(id); }
    function deleteCarousel(id){ if(confirm('Delete slide?')) db.ref('carousel/'+id).remove().then(() => { renderCarouselList(); showToast('Deleted'); }); }
    
    function loadSettingsPage(){
        let html = `
            <div class="section">
                <div class="section-header"><h3>App Settings</h3></div>
                <div class="form-group"><label>Trial Duration (minutes)</label><input type="number" id="trialDuration" class="input" value="2"></div>
                <div class="form-group"><label>Default Trial Time (seconds)</label><input type="number" id="trialSeconds" class="input" value="120"></div>
                <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
            </div>
            <div class="section">
                <div class="section-header"><h3>Broadcast Notification</h3></div>
                <div class="form-group"><label>Title</label><input type="text" id="notifTitle" class="input"></div>
                <div class="form-group"><label>Message</label><textarea id="notifMsg" class="input" rows="3"></textarea></div>
                <div class="form-group"><label>Target</label>
                    <select id="notifTarget" class="input">
                        <option value="all">All Users</option>
                        <option value="premium">Premium Only</option>
                        <option value="trial">Trial Only</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="sendNotification()">Send Notification</button>
            </div>
        `;
        document.getElementById('pageContent').innerHTML = html;
    }
    
    function saveSettings(){
        let duration = document.getElementById('trialDuration').value;
        let seconds = document.getElementById('trialSeconds').value;
        db.ref('appSettings').set({ trialDurationMinutes: parseInt(duration), trialSeconds: parseInt(seconds) }).then(() => showToast('Settings saved'));
    }
    
    function sendNotification(){
        let title = document.getElementById('notifTitle').value;
        let msg = document.getElementById('notifMsg').value;
        let target = document.getElementById('notifTarget').value;
        if(!title || !msg){ showToast('Enter title and message'); return; }
        let usersToNotify = allUsers.filter(u => {
            if(target === 'premium') return u.isPremium;
            if(target === 'trial') return u.trialExpiry && u.trialExpiry > Date.now() && !u.isPremium;
            return true;
        });
        usersToNotify.forEach(u => {
            db.ref('notifications/' + u.id).push({ title, message: msg, timestamp: Date.now(), read: false });
        });
        showToast(`Notification sent to ${usersToNotify.length} users`);
    }
    
    function closeModal(id){
        let modal = document.getElementById(id);
        if(modal) modal.classList.remove('show');
        else document.querySelector('.modal')?.remove();
    }
    
    function showToast(msg){
        let toast = document.createElement('div');
        toast.style.position = 'fixed'; toast.style.bottom = '20px'; toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)'; toast.style.background = 'var(--primary)';
        toast.style.color = '#000'; toast.style.padding = '10px 20px'; toast.style.borderRadius = '30px';
        toast.style.zIndex = '9999'; toast.style.fontSize = '14px';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function toggleSidebar(){
        document.getElementById('sidebar').classList.toggle('open');
    }
    
    loadData();
</script>
