<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stany Panel | Premium Digital Services</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <meta property="og:title" content="Stany Panel Service">
    <meta property="og:image" content="https://d.uguu.se/YXMBoWQi.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f97316">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0a12;
            --card: #16162a;
            --primary: #f97316;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --success: #10b981;
            --text: #ffffff;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,10,18,0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .btn {
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        /* Categories Grid with Images */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 24px;
            margin: 40px 0;
        }

        .category-card {
            background: var(--card);
            border-radius: 28px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            text-align: center;
        }

        .category-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .category-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }

        .category-name {
            padding: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            background: var(--card);
        }

        /* Services Grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin: 30px 0;
        }

        .service-card {
            background: var(--card);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .service-card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
        }

        .service-img {
            width: 100%;
            height: 170px;
            object-fit: cover;
        }

        .service-content {
            padding: 18px;
        }

        .price-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            border-radius: 32px;
            max-width: 550px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .price-option {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 60px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .price-option.selected {
            background: rgba(249,115,22,0.2);
            border-color: var(--primary);
        }

        .form-input {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 60px;
            color: white;
            margin-bottom: 12px;
        }

        .requirements-box {
            background: rgba(6,182,212,0.1);
            padding: 16px;
            border-radius: 20px;
            margin: 15px 0;
            font-size: 0.85rem;
            border-left: 3px solid var(--accent);
        }

        .requirements-box ul {
            margin-left: 20px;
            margin-top: 8px;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 5px 20px rgba(37,211,102,0.4);
            z-index: 99;
        }

        @media (max-width: 680px) {
            .categories-grid { gap: 12px; }
            .category-img { height: 110px; }
        }
    </style>
</head>
<body>

<header>

<main class="container">

            <h1 style="font-size: 2.2rem; background: linear-gradient(135deg,#fff,var(--primary),var(--secondary)); -webkit-background-clip:text; background-clip:text; color:transparent;">Premium Digital Services</h1>
            <p style="color: var(--text-muted); margin: 16px 0;">Panels · Bots · Azam TV · NIDA · VPN — Fast WhatsApp Delivery</p>

    <!-- Dashboard (User) -->

</main>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBhF_jesV0dMhy3cEgehrWlT_mZOtKXySE",
        authDomain: "stanytechzone.firebaseapp.com",
        projectId: "stanytechzone",
        storageBucket: "stanytechzone.firebasestorage.app",
        messagingSenderId: "182249230489",
        appId: "1:182249230489:web:c87d89de113b6714c46808"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let selectedService = null;
    let selectedPlan = null;

    // Category Images (as requested)
    const CATEGORIES = [
        { key: "all", name: "All Services", img: "https://o.uguu.se/vizuEVnl.jpg" },
        { key: "panels", name: "Panels", img: "https://o.uguu.se/vizuEVnl.jpg" },
        { key: "bots", name: "Bots", img: "https://d.uguu.se/VJGvwiWA.jpg" },
        { key: "azam", name: "Azam TV", img: "https://n.uguu.se/eUPrQpsS.jpg" },
        { key: "documents", name: "Documents", img: "https://o.uguu.se/vizuEVnl.jpg" },
        { key: "vpn", name: "VPN & Security", img: "https://o.uguu.se/vizuEVnl.jpg" }
    ];

    // Default Services (will sync with Firestore)
    let SERVICES = [];

    // Load services from Firestore or use defaults
    async function loadServicesFromFirestore() {
        const snap = await db.collection("services").get();
        if(!snap.empty) {
            SERVICES = [];
            snap.forEach(doc => SERVICES.push({ id: doc.id, ...doc.data() }));
        } else {
            // Default services
            SERVICES = [
                { id: "unl", name: "Unlimited Panel", category: "panels", desc: "Full premium access", img: "https://images.unsplash.com/photo-1551654815-9c73c7b1c7f1?w=400&h=250&fit=crop", prices: [{plan:"Unlimited",price:"5,000 TZS"}], needPanel: true },
                { id: "2gb", name: "2GB Panel", category: "panels", desc: "2GB data", img: "https://images.unsplash.com/photo-1553877522-43269d4ea984?w=400&h=250&fit=crop", prices: [{plan:"2GB",price:"3,000 TZS"}], needPanel: true },
                { id: "4gb", name: "4GB Panel", category: "panels", desc: "4GB data", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=400&h=250&fit=crop", prices: [{plan:"4GB",price:"4,000 TZS"}], needPanel: true },
                { id: "5gb", name: "5GB Panel", category: "panels", desc: "5GB ultimate", img: "https://images.unsplash.com/photo-1551434678-e076c223a692?w=400&h=250&fit=crop", prices: [{plan:"5GB",price:"4,500 TZS"}], needPanel: true },
                { id: "bugbot", name: "Bug Bot", category: "bots", desc: "Advanced WhatsApp bot", img: "https://d.uguu.se/JWnGgPpw.jpg", prices: [{plan:"Bug Bot",price:"5,000 TZS"}], needPanel: false },
                { id: "normalbot", name: "Normal Bot", category: "bots", desc: "Standard automation", img: "https://d.uguu.se/JWnGgPpw.jpg", prices: [{plan:"Normal Bot",price:"4,000 TZS"}], needPanel: false },
                { id: "botdev", name: "Bot Development", category: "bots", desc: "Custom bot", img: "https://d.uguu.se/JWnGgPpw.jpg", prices: [{plan:"Development",price:"25,000 TZS"}], needPanel: false },
                { id: "azam1d", name: "Azam TV 1 Day", category: "azam", desc: "24h access", img: "https://h.uguu.se/lgmUMJlX.jpg", prices: [{plan:"1 Day",price:"500 TZS"}], needPanel: false },
                { id: "azam1w", name: "Azam TV 1 Week", category: "azam", desc: "7 days", img: "https://h.uguu.se/lgmUMJlX.jpg", prices: [{plan:"1 Week",price:"2,000 TZS"}], needPanel: false },
                { id: "azam1m", name: "Azam TV 1 Month", category: "azam", desc: "Monthly", img: "https://h.uguu.se/lgmUMJlX.jpg", prices: [{plan:"1 Month",price:"3,000 TZS"}], needPanel: false },
                { id: "azam1y", name: "Azam TV 1 Year", category: "azam", desc: "Yearly best", img: "https://h.uguu.se/lgmUMJlX.jpg", prices: [{plan:"1 Year",price:"5,000 TZS"}], needPanel: false },
                { id: "nida", name: "NIDA Soft Copy", category: "documents", desc: "Digital NIDA", img: "https://h.uguu.se/ydzmLpek.jpg", prices: [{plan:"Soft Copy",price:"10,000 TZS"}], needPanel: false, requirements: "📋 Requirements: NIDA number + Mother's name OR completion year + District of residence" },
                { id: "birthcert", name: "Birthday Certificate", category: "documents", desc: "RITA Certificate + Service Fee", img: "https://d.uguu.se/GEJPFeNk.jpg", prices: [{plan:"RITA Fee",price:"20,000 TZS"},{plan:"Service Fee",price:"15,000 TZS"},{plan:"TOTAL",price:"35,000 TZS"}], needPanel: false, requirements: true },
                { id: "halovpn", name: "Halotel VPN", category: "vpn", desc: "Unlimited VPN", img: "https://images.unsplash.com/photo-1551654815-9c73c7b1c7f1?w=400&h=250&fit=crop", prices: [{plan:"10 Days",price:"2,500 TZS"},{plan:"2 Weeks",price:"3,500 TZS"},{plan:"1 Month",price:"4,500 TZS"}], needPanel: false }
            ];
            // Seed to Firestore
            for(const s of SERVICES) await db.collection("services").add(s);
        }
        renderCategories();
    }

    function renderCategories() {
        const container = document.getElementById('categoriesContainer');
        container.innerHTML = `<h3 style="margin: 20px 0 10px;"><i class="fas fa-th-large"></i> Categories</h3><div class="categories-grid" id="categoriesGrid"></div>`;
        const grid = document.getElementById('categoriesGrid');
        grid.innerHTML = CATEGORIES.map(cat => `
            <div class="category-card" data-cat="${cat.key}">
                <img src="${cat.img}" class="category-img" alt="${cat.name}">
                <div class="category-name">${cat.name}</div>
            </div>
        `).join('');
        document.querySelectorAll('.category-card').forEach(card => {
            card.addEventListener('click', () => {
                const catKey = card.dataset.cat;
                let filtered = catKey === 'all' ? SERVICES : SERVICES.filter(s => s.category === catKey);
                displayServices(filtered, catKey);
                document.getElementById('servicesArea').style.display = 'block';
                document.getElementById('servicesTitle').innerHTML = `<i class="fas fa-box-open"></i> ${catKey === 'all' ? 'All Services' : catKey.toUpperCase()}`;
                window.scrollTo({ top: 350, behavior: 'smooth' });
            });
        });
    }

    function displayServices(services, category) {
        const grid = document.getElementById('servicesGrid');
        grid.innerHTML = services.map(svc => `
            <div class="service-card" data-svc='${JSON.stringify(svc).replace(/'/g, "&apos;")}'>
                <img src="${svc.img}" class="service-img" onerror="this.src='https://placehold.co/400x250/16162a/f97316?text=Service'">
                <div class="service-content">
                    <h3>${svc.name}</h3>
                    <p style="color: var(--text-muted); font-size:0.85rem; margin: 8px 0;">${svc.desc || ''}</p>
                    <div class="price-badge">${svc.prices[0].price}</div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.service-card').forEach(card => {
            card.addEventListener('click', () => {
                const raw = card.dataset.svc;
                const service = JSON.parse(raw.replace(/&apos;/g, "'"));
                openOrderModal(service);
            });
        });
    }

    function openOrderModal(service) {
        selectedService = service;
        selectedPlan = service.prices[0];
        
        let priceHtml = service.prices.map((p, idx) => `<div class="price-option ${idx===0?'selected':''}" data-plan='${JSON.stringify(p)}'><span>${p.plan}</span><strong>${p.price}</strong></div>`).join('');
        
        let requirementsHtml = '';
        if(service.id === 'birthcert') {
            requirementsHtml = `
                <div class="requirements-box">
                    <strong><i class="fas fa-file-alt"></i> MAHITAJI YA KUOMBA CHETI CHA KUZALIWA:</strong>
                    <ul style="margin-top: 10px;">
                        <li>Kadi ya Kliniki / Cheti cha FALAKI</li>
                        <li>Pasi ya kusafiria / Kitambulisho cha utaifa</li>
                        <li>Cheti cha kumaliza shule (Leaving Certificate)</li>
                        <li>Kitambulisho cha kupigia kura cha muombaji / wazazi</li>
                        <li>Tangazo la kizazi / Cheti cha Ubatizo</li>
                        <li>Barua ya utambulisho kutoka kwa Afisa Mtendaji wa Kijiji/Kata</li>
                        <li>Leseni ya udereva (kama inapatikana)</li>
                    </ul>
                    <p style="margin-top: 10px;"><strong>💡 Unatakiwa kuwa na angalau viambatanisho viwili (2) au zaidi.</strong> Huduma inapatikana Tanzania nzima.</p>
                </div>
            `;
        } else if(service.id === 'nida') {
            requirementsHtml = `<div class="requirements-box"><strong>📌 Mahitaji ya NIDA Soft Copy:</strong><br>✓ Namba ya NIDA<br>✓ Jina la mama au Mwaka wa kumaliza shule<br>✓ Mkoa unaoishi</div>`;
        }
        
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal active';
        modalDiv.id = 'orderModal';
        modalDiv.innerHTML = `
            <div class="modal-content" style="padding: 0;">
                <div style="padding: 24px; border-bottom:1px solid var(--border);"><h3>${service.name}</h3><p style="color: var(--text-muted);">${service.desc || ''}</p></div>
                <div style="padding: 20px 24px;" id="modalPriceList">${priceHtml}</div>
                ${requirementsHtml}
                <div style="padding: 0 24px 20px;">
                    <input type="text" id="orderName" class="form-input" placeholder="Full Name" value="${currentUser?.displayName || ''}">
                    <input type="tel" id="orderPhone" class="form-input" placeholder="WhatsApp Number" value="">
                    <div id="reqFields" style="display: ${service.needPanel ? 'block' : 'none'};">
                        <input type="email" id="orderEmail" class="form-input" placeholder="Email for Panel Login">
                        <input type="password" id="orderPass" class="form-input" placeholder="Panel Password">
                    </div>
                    <div id="docFields" style="display: ${service.id === 'birthcert' ? 'block' : 'none'};">
                        <input type="text" id="docRequirements" class="form-input" placeholder="List your available documents (e.g., Kadi ya Kliniki, Pasipoti)">
                    </div>
                    <div id="nidaFields" style="display: ${service.id === 'nida' ? 'block' : 'none'};">
                        <input type="text" id="nidaNumber" class="form-input" placeholder="NIDA Number">
                        <input type="text" id="motherName" class="form-input" placeholder="Jina la Mama au Mwaka wa Kumaliza">
                        <input type="text" id="district" class="form-input" placeholder="Mkoa unaoishi">
                    </div>
                    <button id="sendOrderBtn" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:16px;"><i class="fab fa-whatsapp"></i> Order via WhatsApp</button>
                </div>
                <button class="closeModal" style="position:absolute; top:16px; right:20px; background:none; border:none; font-size:28px; color:white; cursor:pointer;">&times;</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        
        // Price selection
        document.querySelectorAll('.price-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.price-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedPlan = JSON.parse(opt.dataset.plan);
            });
        });
        
        document.querySelector('.closeModal').addEventListener('click', () => modalDiv.remove());
        modalDiv.addEventListener('click', (e) => { if(e.target === modalDiv) modalDiv.remove(); });
        
        document.getElementById('sendOrderBtn').addEventListener('click', () => {
            let name = document.getElementById('orderName').value.trim();
            let phone = document.getElementById('orderPhone').value.trim();
            if(!name || !phone) { alert("Please enter your name and WhatsApp number"); return; }
            if(selectedService.needPanel) {
                let email = document.getElementById('orderEmail')?.value.trim();
                let pass = document.getElementById('orderPass')?.value.trim();
                if(!email || !pass) { alert("Email and Password required for panel"); return; }
            }
            
            let phoneNum = phone.replace(/\D/g,'');
            if(!phoneNum.startsWith('255')) phoneNum = '255' + phoneNum.replace(/^0/,'');
            
            let message = `*🛒 STANY PANEL - NEW ORDER*%0A%0A`;
            message += `📦 *Service:* ${selectedService.name}%0A`;
            message += `💰 *Plan:* ${selectedPlan.plan} - ${selectedPlan.price}%0A`;
            message += `👤 *Customer:* ${name}%0A`;
            message += `📞 *WhatsApp:* ${phone}%0A`;
            
            if(selectedService.needPanel) {
                message += `📧 *Email:* ${document.getElementById('orderEmail')?.value.trim()}%0A`;
                message += `🔑 *Panel Password:* ${document.getElementById('orderPass')?.value.trim()}%0A`;
            }
            
            if(selectedService.id === 'birthcert') {
                let docs = document.getElementById('docRequirements')?.value.trim() || "Not specified";
                message += `📋 *Available Documents:* ${docs}%0A`;
                message += `📍 *Service Area:* Available Nationwide Tanzania%0A`;
            } else if(selectedService.id === 'nida') {
                message += `🆔 *NIDA Number:* ${document.getElementById('nidaNumber')?.value.trim()}%0A`;
                message += `👩 *Mother Name/School Year:* ${document.getElementById('motherName')?.value.trim()}%0A`;
                message += `🏙️ *Region:* ${document.getElementById('district')?.value.trim()}%0A`;
            }
            
            message += `%0A✅ *Payment Status:* Pending confirmation%0A`;
            message += `📝 I confirm my order and will complete payment. Please activate after payment.`;
            
            // Save order to Firestore (admin orders collection)
            db.collection("orders").add({
                customerName: name,
                customerPhone: phone,
                serviceName: selectedService.name,
                planName: selectedPlan.plan,
                amount: selectedPlan.price,
                status: "pending",
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                userId: currentUser?.uid || "guest"
            }).catch(console.error);
            
            window.open(`https://wa.me/255787069580?text=${message}`, '_blank');
            modalDiv.remove();
            alert("✅ Order sent! Admin will confirm on WhatsApp.");
        });
    }

    // AUTH LOGIC
    let isLogin = false;
    document.getElementById('loginBtn')?.addEventListener('click', () => {
        isLogin = true;
        document.getElementById('authTitle').innerText = "Login";
        document.getElementById('authBtn').innerText = "Login";
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('authPage').style.display = 'block';
        document.getElementById('dashboardPage').style.display = 'none';
    });
    document.getElementById('signupBtn')?.addEventListener('click', () => {
        isLogin = false;
        document.getElementById('authTitle').innerText = "Create Account";
        document.getElementById('authBtn').innerText = "Sign Up";
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('authPage').style.display = 'block';
        document.getElementById('dashboardPage').style.display = 'none';
    });
    document.getElementById('toggleAuthMode')?.addEventListener('click', () => {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? "Login" : "Create Account";
        document.getElementById('authBtn').innerText = isLogin ? "Login" : "Sign Up";
    });
    document.getElementById('authForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const pwd = document.getElementById('password').value;
        if(!username || !phone || pwd.length<6) { alert("Fill all fields correctly"); return; }
        try {
            if(isLogin) {
                await auth.signInWithEmailAndPassword(username.replace(/\s/g,'')+"@stany.com", pwd);
            } else {
                await auth.createUserWithEmailAndPassword(username.replace(/\s/g,'')+"@stany.com", pwd);
                await auth.currentUser.updateProfile({displayName: username});
                await db.collection("users").doc(auth.currentUser.uid).set({name: username, phone, createdAt: new Date()});
            }
        } catch(err) { alert(err.message); }
    });
    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUser = user;
            document.getElementById('authButtons').style.display = 'none';
            document.getElementById('userMenu').style.display = 'flex';
            document.getElementById('userName').innerText = user.displayName || "User";
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('dashboardPage').style.display = 'block';
            await loadServicesFromFirestore();
            document.getElementById('servicesArea').style.display = 'none';
        } else {
            currentUser = null;
            document.getElementById('authButtons').style.display = 'flex';
            document.getElementById('userMenu').style.display = 'none';
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('dashboardPage').style.display = 'none';
            document.getElementById('authPage').style.display = 'none';
        }
    });
    document.getElementById('logoutBtn')?.addEventListener('click', () => auth.signOut());
    document.getElementById('homeLink')?.addEventListener('click', () => {
        if(currentUser) {
            document.getElementById('dashboardPage').style.display = 'block';
            document.getElementById('servicesArea').style.display = 'none';
            document.getElementById('homePage').style.display = 'none';
        } else {
            document.getElementById('homePage').style.display = 'block';
        }
    });
    document.getElementById('exploreBtn')?.addEventListener('click', () => {
        if(!currentUser) {
            isLogin = false;
            document.getElementById('authTitle').innerText = "Create Account";
            document.getElementById('authBtn').innerText = "Sign Up";
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('authPage').style.display = 'block';
        }
    });
    document.getElementById('backBtn')?.addEventListener('click', () => {
        document.getElementById('servicesArea').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
</script>
</body>
</html>
